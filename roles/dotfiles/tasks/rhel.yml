---

- name: "Git clone dotfiles"
  ansible.builtin.git:
    repo: "{{ common_dotfiles_repo }}"
    dest: "{{ common_dotfiles_dest }}"
    version: "{{ common_dotfiles_branch }}"

- name: "Dotfiles setup"
  ansible.builtin.shell: "{{ common_dotfiles_setup_shell }}"
  args:
    chdir: "{{ common_dotfiles_dest }}"
    executable: /bin/bash
  register: dotfiles_result_setup_dotfiles
  changed_when: dotfiles_result_setup_dotfiles.rc == 0

- name: "PlugInstall"
  ansible.builtin.shell: vim +PlugInstall +qall
  args:
    executable: /bin/bash
  register: dotfiles_result
  changed_when: dotfiles_result.rc == 0

- name: "Git clone dotfiles for root"
  ansible.builtin.git:
    repo: "{{ common_dotfiles_repo }}"
    dest: "/root/{{ common_dotfiles_dest }}"
    version: "{{ common_dotfiles_branch }}"
  become: true

- name: "Dotfiles setup for root"
  ansible.builtin.shell: "{{ common_dotfiles_setup_shell }}"
  args:
    chdir: "/root/{{ common_dotfiles_dest }}"
    executable: /bin/bash
  register: dotfiles_result_setup_dotfiles
  changed_when: dotfiles_result_setup_dotfiles.rc == 0
  become: true

- name: "PlugInstall"
  ansible.builtin.shell: vim +PlugInstall +qall
  args:
    executable: /bin/bash
  register: dotfiles_result
  changed_when: dotfiles_result.rc == 0
  become: true
